<!DOCTYPE html>
<html>
    <head>
        <title>
            Internship confirmation Form
        </title>
    </head>
    <bpdy>
        <h1>Internship confirmation Form</h1>
        <form>
            <table>
                <tr>
                <td>Student name:</td>
                <td> <input type ="text" required></td>
                </tr>

                <tr>
                    <td> Email Address:</td>
                    <td><input type="email" required></td>
                </tr>

                <tr>
                    <td>Preferred Internshio type:</td>
                    <td><input type="radio" name="type">on_site
                        <br>
                        <input type="radio" name="type">Remote
                    
                    </td>
                </tr>

                <tr> 
                    <td> Internship Duration:</td>
                    <td>
                        <select>
                            <option>6 weeks</option>
                            <option>3 months</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>Skills of Interests:</td>
                    <td>
                        <input type="checkbox">Web Developer
                        <br>
                        <input type="checkbox">Data analysis
                        <br>
                        <input type="checkbox">Mobile Apps
                    </td>
                </tr>
                <tr>
                    <td><input type="Submit"></td>
                </tr>
            </table>
        </form>
    </bpdy>
</html>
