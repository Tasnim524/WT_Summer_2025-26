<!DOCTYPE html>
<html>
<head>
    <title>Contact Form Validation</title>

    <style>
        body{
            font-family: Arial;
            background-color: white;
        }

        .container{
            width:400px;
            margin: auto;
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        h2{
            text-align: center;
        }

        input,textarea{
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        button{
            width:100%;
            padding:10px;
            background:blue;
            color:white;
            border:none;
            cursor:pointer;
        }
        button:hover{
            background:darkblue;
        }

        .error{
            color:red;
            font-size:14px;
            margin-bottom:8px;
        }

        #success{
            margin-top: 20px;
            color:green;
            font-weight: bold;
        }



  
    </style>

</head>

<body>

<div class="container">

<h2>Contact Form</h2>

<form id="myForm">
    <label>Name</label>
    <input type="text" id="name">
    <p class="error" id="nameError"></p>

    <label>Email</label>
    <input type="text" id="email">
    <p class="error" id="emailError"></p>

    <label>Phone number</label>
    <input type="text" id="phone">
    <p class="error" id="phoneError"></p>

    <label>Password</label>
    <input type="password" id="password">
    <p class="error" id="passwordError"></p>

    <label>Age</label>
    <input type="text" id="age">
    <p class="error" id="ageError"></p>

    <label>Message</label>
    <textarea id="message"></textarea>
    <p class="error" id="messageError"></p>

    <button type="submit">Register</button>


</form>

<div id="success"></div>



</div>

<script>
    document.getElementById("myForm").addEventListener("submit", function(event){
        event.preventDefault();

        var valid=true;
        var name=document.getElementById("name").value;
        var email=document.getElementById("email").value;
        var phone=document.getElementById("phone").value;
        var password=document.getElementById("password").value;
        var age=document.getElementById("age").value;
        var message=document.getElementById("message").value;

        document.getElementById("nameError").innerHTML="";
        document.getElementById("emailError").innerHTML="";
        document.getElementById("phoneError").innerHTML="";
        document.getElementById("passwordError").innerHTML="";
        document.getElementById("ageError").innerHTML="";
        document.getElementById("messageError").innerHTML="";
        document.getElementById("success").innerHTML="";

        if(name===""){
            document.getElementById("nameError").innerHTML="Name is required";
            valid=false;;
        }

        if(name.length<3){
            document.getElementById("nameError").innerHTML="Minimum 3 characters";
            valid=false;;
        }
        if(!/^[A-Za-z ]+$/.test(name)){
           document.getElementById("nameError").innerHTML="Only alphabets and spaces";
           valid=false;; 
        }

        if(email===""){
            document.getElementById("emailError").innerHTML="email is required";
            valid=false;;
        }

        if(email.indexOf("@")==-1 || email.indexOf(".")==-1)
        {
            document.getElementById("emailError").innerHTML="Invalid Email";
            valid=false;;
        }

        if(phone==="")
        {
            document.getElementById("phoneError").innerHTML="Phone number is required";
            valid=false;;
        }

        if(phone.length!=10 || isNaN(phone)){
            document.getElementById("phoneError").innerHTML="Phone must be 10 digits";
            valid=false;;
        }

        if(password==""){
           document.getElementById("passwordError").innerHTML="Password is required";
            valid=false;;
        }
        if(!/^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[@#$%^&*!]).{8,}$/.test(password)){
           document.getElementById("passwordError").innerHTML="Password is not strong enough";
           valid=false;;
         }

  
    if(age=="")
        {
            document.getElementById("ageError").innerHTML="Age is required";
            valid=false;
        }
        else if(age<18 || isNaN(age))
        {
            document.getElementById("ageError").innerHTML="Age must be 18 or older";
            valid=false;
        }

        if(message=="")
        {
            document.getElementById("messageError").innerHTML="Message is required";
            valid=false;
        }
        else if(message.length<10)
        {
        document.getElementById("messageError").innerHTML="Message must be at least 10 characters";
            valid=false;
        }

    if(valid){

        document.getElementById("success").innerHTML=
        "<h3>Registration Successful!</h3>"+
        "<p><b>Name:</b> "+name+"</p>"+
        "<p><b>Email:</b> "+email+"</p>"+
        "<p><b>Phone:</b> "+phone+"</p>"+
        "<p><b>Age:</b> "+age+"</p>"+
        "<p><b>Message:</b> "+message+"</p>"+
        "<p>Thank you for registering successfully.</p>";

        document.getElementById("myForm").reset();
    }



    });



</script>

</body>
</html>
