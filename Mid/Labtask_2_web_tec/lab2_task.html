<!DOCTYPE html>
<html>
    <head>
        <title>Student service</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <header>
            <h1>Student Service Request Portal</h1>
            <p>Submit your service requests online.</p>

        </header>

        <nav>
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>

        <main>

            <section>
                <h2>Service Request Form</h2>

                <form>
                   <table>
                    <tr>
                        <td>Student name:</td>
                        <td><input type="text" required></td>
                    </tr>

                    <tr>
                        <td>Student ID:</td>
                        <td><input type="text" maxlength="10"></td>

                    </tr>

                    <tr>
                        <td>Email:</td>
                        <td><input type="email" required></td>
                    </tr>
                    <tr>
                        <td>Service Type:</td>
                        <td>
                            <select>
                                <option>Transcript Request</option>
                                <option>ID Card Issue</option>
                                <option>General Inquiry</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td>Urgency Level:</td>
                        <td>
                            <input type="radio" name="urgency">low
                            <input type="radio" name="urgency">Medium
                            <input type="radio" name="urgency">High
                        </td>
                    </tr>
                    <tr>
                        <td>Additional Details:</td>
                        <td>
                            <textarea rows="5" cols="30"></textarea>

                            </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" value="Submit"></td>
                    </tr>

                   </table>

                       
                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Student Affair department</p>
        </footer>


    </body>
</html>
